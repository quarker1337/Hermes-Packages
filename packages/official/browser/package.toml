schema_version = 1
name = "browser"
display_name = "Browser Automation"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Browser automation tools and local/managed browser backends, plus the generic browser automation workflow skill. Includes web-search because the historical browser toolset exposed web_search for URL discovery."
license = "MIT"
maintainer = "NanoHermes"
dependencies = ["web-search"]

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = []
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/browser-tools.tar.gz", format = "tar.gz", sha256 = "16b5449889bc336958bdf489dd07d42e19f669008391f9cc63e572dc6544cf62", destination = "python-site-packages/tools" },
  { type = "skill_pack", source = "assets/skills/skills-browser-workflow.tar.gz", format = "tar.gz", sha256 = "4b026258a024f618c4586c70b8f4e1bccfff8b545e7caf03b3121c85d919b04a", destination = "skills", overwrite = false },
]

[tools]
toolsets = ["browser"]
tools = [
  "browser_navigate",
  "browser_snapshot",
  "browser_click",
  "browser_type",
  "browser_scroll",
  "browser_back",
  "browser_press",
  "browser_get_images",
  "browser_vision",
  "browser_console",
  "browser_cdp",
  "browser_dialog",
  "web_search",
]

[permissions]
network = true
filesystem = false
shell = false
browser = true
audio = false
microphone = false
secrets = []

[env]
required = []
optional = []

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false

[contents]
skills = [
  "software-development/browser-automation-workflow",
]
