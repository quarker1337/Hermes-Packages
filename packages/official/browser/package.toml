schema_version = 1
name = "browser"
display_name = "Browser Automation"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Browser automation tools and local/managed browser backends. Includes web-search because the historical browser toolset exposed web_search for URL discovery."
license = "MIT"
maintainer = "NanoHermes"
dependencies = ["web-search"]

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = []
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/browser-tools.tar.gz", format = "tar.gz", sha256 = "3d8c74f67399df8e8758639c118dbc73f8180870f212c43310e613524f1600bc", destination = "python-site-packages/tools" },
]

[tools]
toolsets = ["browser"]
tools = [
  "browser_navigate",
  "browser_snapshot",
  "browser_click",
  "browser_type",
  "browser_scroll",
  "browser_back",
  "browser_press",
  "browser_get_images",
  "browser_vision",
  "browser_console",
  "browser_cdp",
  "browser_dialog",
  "web_search",
]

[permissions]
network = true
filesystem = false
shell = false
browser = true
audio = false
microphone = false
secrets = []

[env]
required = []
optional = []

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
