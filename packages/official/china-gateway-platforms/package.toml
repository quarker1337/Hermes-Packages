schema_version = 1
name = "china-gateway-platforms"
display_name = "China Gateway Platforms"
version = "0.1.0"
type = "plugin"
channel = "official"
description = "Optional China-region gateway platform adapters for NanoHermes."
license = "MIT"
maintainer = "NanoHermes"
dependencies = ["gateway"]

[nanohermes]
min_version = "0.15.1"
max_version = "<1.0.0"

[install]
python_extras = []
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/china-gateway-platforms.tar.gz", format = "tar.gz", destination = "python-site-packages/gateway/platforms", overwrite = false },
]

[tools]
toolsets = []
tools = []

[permissions]
network = true
filesystem = false
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["DINGTALK_CLIENT_ID", "DINGTALK_CLIENT_SECRET", "WECOM_CORP_ID", "WECOM_SECRET", "WEIXIN_APP_ID", "QQBOT_APP_ID"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
