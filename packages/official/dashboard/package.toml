schema_version = 1
name = "dashboard"
display_name = "Local Web Dashboard"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Local web UI/API dashboard plus tightly integrated Kanban dispatcher."
license = "MIT"
maintainer = "NanoHermes"
dependencies = []

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = ["dashboard"]
python_packages = []
system_packages = []
npm_packages = ["dashboard-frontend"]
optional_assets = [
  { type = "python_module_pack", source = "assets/python/dashboard-hermes-cli.tar.gz", format = "tar.gz", destination = "python-site-packages/hermes_cli" },
  { type = "python_module_pack", source = "assets/python/dashboard-tools.tar.gz", format = "tar.gz", destination = "python-site-packages/tools" },
  { type = "python_module_pack", source = "assets/python/dashboard-kanban-plugin.tar.gz", format = "tar.gz", destination = "python-site-packages/plugins/kanban" },
  { type = "skill_pack", source = "assets/skills/skills-kanban.tar.gz", format = "tar.gz", sha256 = "02bed93eca5a80c691d387cb125bd5f501edb185f0b9cccde1e543fe7912b6d1", destination = "skills", overwrite = false },
]

[contents]
skills = [
  "devops/kanban-orchestrator",
  "devops/kanban-worker",
  "autonomous-ai-agents/kanban-codex-lane",
  "creative/kanban-video-orchestrator",
]

[tools]
toolsets = ["kanban"]
tools = []

[permissions]
network = true
filesystem = true
shell = true
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = []

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
