schema_version = 1
name = "desktop"
display_name = "Hermes Desktop"
version = "0.1.4"
type = "bundle"
channel = "official"
description = "Package-managed prebuilt Electron desktop app for NanoHermes."
license = "MIT"
maintainer = "NanoHermes"
dependencies = ["dashboard"]

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = []
python_packages = []
system_packages = []
npm_packages = []
runtime_dependencies = []
optional_assets = [
  { type = "app_asset", source = "assets/apps/desktop-client-linux-x64.tar.xz", format = "tar.xz", destination = "apps/desktop-workspace", overwrite = true },
  { type = "app_asset", source = "assets/apps/desktop-remote-recovery-overlay.tar.xz", format = "tar.xz", destination = "apps/desktop-workspace", overwrite = true },
]

[tools]
toolsets = []
tools = []

[permissions]
network = true
filesystem = true
shell = true
browser = false
audio = true
microphone = true
secrets = []

[env]
required = []
optional = []

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
