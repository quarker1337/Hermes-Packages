schema_version = 1
name = "extra-platform-plugins"
display_name = "Extra Platform Plugins"
version = "0.1.0"
type = "plugin"
channel = "official"
description = "Optional non-core messaging platform plugin adapters for NanoHermes."
license = "MIT"
maintainer = "NanoHermes"
dependencies = ["gateway"]

[nanohermes]
min_version = "0.15.1"
max_version = "<1.0.0"

[install]
python_extras = []
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/extra-platform-plugins.tar.gz", format = "tar.gz", destination = "python-site-packages/plugins/platforms", overwrite = false },
]

[tools]
toolsets = []
tools = []

[permissions]
network = true
filesystem = false
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["GOOGLE_CHAT_WEBHOOK", "LINE_CHANNEL_ACCESS_TOKEN", "MATTERMOST_TOKEN", "TEAMS_WEBHOOK_URL"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
