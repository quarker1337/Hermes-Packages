schema_version = 1
name = "feishu"
display_name = "Feishu"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Feishu/Lark document and drive integrations."
license = "MIT"
maintainer = "NanoHermes"
dependencies = ["gateway"]

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = ["feishu"]
python_packages = []
system_packages = []
npm_packages = []
optional_assets = []

[tools]
toolsets = ["feishu_doc", "feishu_drive"]
tools = []

[permissions]
network = true
filesystem = false
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["FEISHU_APP_ID", "FEISHU_APP_SECRET"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
