schema_version = 1
name = "feishu"
display_name = "Feishu"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Feishu/Lark document and drive integrations."
license = "MIT"
maintainer = "NanoHermes"
dependencies = ["gateway"]

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = ["feishu"]
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/feishu-tools.tar.gz", format = "tar.gz", sha256 = "b25c12dba3ba4ef56d2a3cf89fe243096675465d0a61768a51866f8c10add702", destination = "python-site-packages/tools" },
  { type = "python_module_pack", source = "assets/python/feishu-gateway-platforms.tar.gz", format = "tar.gz", destination = "python-site-packages/gateway/platforms", overwrite = false },
]

[tools]
toolsets = ["feishu_doc", "feishu_drive"]
tools = [
  "feishu_doc_read",
  "feishu_drive_list_comments",
  "feishu_drive_list_comment_replies",
  "feishu_drive_reply_comment",
  "feishu_drive_add_comment",
]

[permissions]
network = true
filesystem = false
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["FEISHU_APP_ID", "FEISHU_APP_SECRET"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
