schema_version = 1
name = "gateway"
display_name = "Messaging Gateway"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Messaging platform gateway framework."
license = "MIT"
maintainer = "NanoHermes"
dependencies = []

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = []
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/gateway-tools.tar.gz", format = "tar.gz", sha256 = "5d44c236697e0174595b50cb2450a7ed867355016dcae07ed569ed6de61934dd", destination = "python-site-packages/tools" },
]

[tools]
toolsets = ["messaging"]
tools = ["send_message"]

[permissions]
network = true
filesystem = false
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["TELEGRAM_BOT_TOKEN", "DISCORD_BOT_TOKEN", "SLACK_BOT_TOKEN"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
