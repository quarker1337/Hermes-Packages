schema_version = 1
name = "homeassistant"
display_name = "Home Assistant"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Smart-home controls through Home Assistant plus the matching OpenHue workflow skill."
license = "MIT"
maintainer = "NanoHermes"
dependencies = []

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = ["homeassistant"]
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/homeassistant-tools.tar.gz", format = "tar.gz", sha256 = "39ce51b213057d9e27822d6282bbe82f4600ba9ebe7ab627d045d413295547c4", destination = "python-site-packages/tools" },
  { type = "skill_pack", source = "assets/skills/skills-homeassistant.tar.gz", format = "tar.gz", sha256 = "d987c43a44a319a566bd8f7eeb48355e11499be0cbce3234dd3a11737faa59ef", destination = "skills", overwrite = false },
]

[tools]
toolsets = ["homeassistant"]
tools = [
  "ha_list_entities",
  "ha_get_state",
  "ha_list_services",
  "ha_call_service",
]

[permissions]
network = true
filesystem = true
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["HOMEASSISTANT_URL", "HOMEASSISTANT_TOKEN"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false

[contents]
skills = [
  "smart-home/openhue",
]
