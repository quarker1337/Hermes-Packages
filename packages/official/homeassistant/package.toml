network = true
filesystem = false
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["HOMEASSISTANT_URL", "HOMEASSISTANT_TOKEN"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
