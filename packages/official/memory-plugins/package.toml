schema_version = 1
name = "memory-plugins"
display_name = "Memory Plugins"
version = "0.1.0"
type = "plugin"
channel = "official"
description = "Optional third-party memory provider plugins for NanoHermes."
license = "MIT"
maintainer = "NanoHermes"
dependencies = []

[nanohermes]
min_version = "0.15.1"
max_version = "<1.0.0"

[install]
python_extras = []
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "python_module_pack", source = "assets/python/memory-plugins.tar.gz", format = "tar.gz", destination = "python-site-packages/plugins/memory", overwrite = false },
]

[tools]
toolsets = []
tools = []

[permissions]
network = true
filesystem = false
shell = false
browser = false
audio = false
microphone = false
secrets = []

[env]
required = []
optional = ["HONCHO_API_KEY", "MEM0_API_KEY", "SUPERMEMORY_API_KEY", "BYTEROVER_API_KEY"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
