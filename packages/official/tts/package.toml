schema_version = 1
name = "tts"
display_name = "Text to Speech"
version = "0.1.0"
type = "toolset"
channel = "official"
description = "Text-to-speech tools and lightweight providers."
license = "MIT"
maintainer = "NanoHermes"
dependencies = []

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = ["tts"]
python_packages = []
system_packages = []
npm_packages = []
optional_assets = []

[tools]
toolsets = ["tts"]
tools = ["tts_speak"]

[permissions]
network = true
filesystem = false
shell = false
browser = false
audio = true
microphone = false
secrets = []

[env]
required = []
optional = ["VOICE_TOOLS_OPENAI_KEY", "ELEVENLABS_API_KEY"]

[checks]
commands = []
python_imports = []

[security]
checksum = ""
signed = false
post_install_scripts = false
