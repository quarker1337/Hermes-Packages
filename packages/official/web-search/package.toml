type = "toolset"
channel = "official"
description = "Web search and page extraction tools plus lightweight web-search workflow skills."
license = "MIT"
maintainer = "NanoHermes"
dependencies = []

[nanohermes]
min_version = "0.1.0"
max_version = "<1.0.0"

[install]
python_extras = ["web-search"]
python_packages = []
system_packages = []
npm_packages = []
optional_assets = [
  { type = "skill_pack", source = "assets/skills/skills-web-search.tar.gz", format = "tar.gz", sha256 = "e45d0b98baef35ca003eed94186d20b4c4ad54e4fbdf6899336e5f8854bafef0", destination = "skills", overwrite = false },
]

